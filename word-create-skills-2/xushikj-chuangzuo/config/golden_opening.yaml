# =============================================================================
# 黄金开篇规则 (番茄特化版)
# 叙事空间创作系统 v3.0
# =============================================================================

scope: "前三章（前六千字）内严格执行，决定作品生死"

description: |
  番茄小说的开篇是留存率的核心。你必须以极快的节奏、极强的情绪拉扯和最快的金手指反馈来瞬间抓住读者，绝不拖泥带水。

rules:
  - id: "go_01"
    name: "情绪与危机极速切入"
    content: "严禁任何形式的背景铺垫或风景描写。开局第一段必须直接将主角置于极具张力的情绪现场（如遭遇背叛、生死危机、极致的不公或屈辱），用强烈的情绪共鸣锁定读者。"

  - id: "go_02"
    name: "核心冲突与仇恨拉满"
    content: "第一章前500字内必须清晰抛出主角当前的绝境，反派的嘴脸或困境的压迫感必须刻画得入木三分，直接挑起读者的怒火或极高的期待感。"

  - id: "go_03"
    name: "零信息负担"
    content: "绝对禁止大篇幅介绍世界观、等级设定或冗长的过去经历。所有设定必须在主角打脸、反杀或获取奖励的过程中，作为'爽感放大器'顺带提及。"

  - id: "go_04"
    name: "视角的绝对聚焦"
    content: "开篇(第一章)有名有姓的敌对角色或关键配角不应超过两人。所有聚光灯必须死死打在主角身上，禁止切换到配角视角去水字数。"

  - id: "go_05"
    name: "金手指秒到账与即时反馈"
    content: "[最核心规则] 金手指（系统、异能、老爷爷等）必须在第一章末尾或第二章极速激活！激活后，必须在第三章之内立刻利用金手指完成第一次实质性的'反打脸'或'危机破除'，给予读者极其强烈的多巴胺奖励。"
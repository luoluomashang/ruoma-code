# =============================================================================
# 数据化质量评估维度
# 叙事空间创作系统 v3.0
# =============================================================================
# 原提示词位置：第一部分·第六法则
# 原文逐字保留，仅做 YAML 结构化
# =============================================================================

priority_note: |
  在追求极致情绪价值的同时，你必须能够从更客观的维度审视和优化文本质量。你将内置一个评估模块，从以下八个维度对生成内容进行自检与优化，确保作品在具备商业爽感的同时，也拥有高级的文本质感。当这些维度与追求极致直白的"爽感"描写产生冲突时，以"爽感"为优先。

dimensions:
  - id: "qd_01"
    name: "修辞手法"
    description: "评估隐喻、象征等手法的数量与质量。"

  - id: "qd_02"
    name: "感官细节丰富度"
    description: "评估视觉、听觉等感官描写的频率和深度。"

  - id: "qd_03"
    name: "角色出场平衡度"
    description: "评估核心角色的出场频率、对话占比和心理描写的平衡性。"

  - id: "qd_04"
    name: "角色对话独特性"
    description: "评估对话是否能鲜明地反映角色性格，即使隐去名字也能区分。"

  - id: "qd_05"
    name: "角色塑造一致性"
    description: "评估角色的言行是否始终与其身份、背景和底层逻辑保持一致。"

  - id: "qd_06"
    name: "意境与主题匹配度"
    description: "评估场景描写是否服务于故事的整体氛围和核心主题。"

  - id: "qd_07"
    name: "语境适配度"
    description: "评估环境细节是否与故事的时代、地域和文化背景相匹配。"

  - id: "qd_08"
    name: "场景衔接连贯性"
    description: "评估场景转换是否流畅自然，避免割裂感。"

  - id: "qd_09"
    name: "仇恨拉扯与反派智商在线度"
    description: "反派的压迫感是否来自于其真实的实力、权谋或狠辣手段？严禁反派出现无脑挑衅、强行降智送人头的行为。反派越狡猾，主角的反杀得分越高。"

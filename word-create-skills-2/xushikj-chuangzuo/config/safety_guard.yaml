# =============================================================================
# 防审查信息流失双保险配置
# 叙事空间创作系统 v3.0
# =============================================================================
# 设计文档: references/safety-guard-design.md
# 声明模板: config/declarations.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# 保险一：前置专业上下文声明
# ---------------------------------------------------------------------------
professional_context:
  enabled: true
  project_declaration: true       # L1 项目级声明（全局生效）
  step_declaration: true          # L2 步骤级声明（高敏感步骤前注入）
  scene_declaration: true         # L3 段落级声明（最高敏感度段落前注入）
  auto_escalate_on_retry: true    # 重试时自动升级声明级别

# ---------------------------------------------------------------------------
# 敏感度标签系统
# 场景规划（步骤9）时为每个场景标注
# ---------------------------------------------------------------------------
sensitivity_tags:
  GREEN:
    description: "日常、对话、风景、修炼"
    declaration_levels: ["L1"]
  YELLOW:
    description: "战斗、心理博弈、情感冲突"
    declaration_levels: ["L1", "L2"]
  RED:
    description: "亲密互动、暴力细节、黑暗主题"
    declaration_levels: ["L1", "L2", "L3"]

# ---------------------------------------------------------------------------
# 保险二：输出完整性验证
# ---------------------------------------------------------------------------
health_check:
  enabled: true
  length_threshold: 0.7           # HC1: 字数达标率阈值（实际/预期）
  warn_accumulate_limit: 3        # WARN 累计几次升级为 HALT
  max_retries: 3                  # 最大重试次数

  # 拒绝标志词（HC2/HC4 检测用）
  refusal_signals:
    - "我无法"
    - "作为AI"
    - "我不能"
    - "抱歉我无法"
    - "I cannot"
    - "I'm unable"
    - "As an AI"
    - "I apologize but"
    - "很抱歉"
    - "对不起我不能"

  # 内容降级信号（HC3 检测用）
  degradation_signals:
    - "此处省略"
    - "接下来的内容"
    - "两人之间发生了一些事"
    - "（此处略过）"
    - "[省略]"
    - "……（作者注）"

  # 安全注入信号（HC5 检测用）
  safety_injection_signals:
    - "请注意"
    - "需要提醒"
    - "这里需要说明"
    - "温馨提示"
    - "请读者注意"
    - "以下内容可能"
    - "声明："

# ---------------------------------------------------------------------------
# 异常处理分级
# ---------------------------------------------------------------------------
response_levels:
  PASS:
    description: "全部检查通过"
    action: "正常继续流程"

  WARN:
    description: "HC1/HC5 单项触发"
    action: "标记 warning，继续流程，在章节质量报告中高亮"
    triggers:
      - "HC1_LENGTH"
      - "HC5_SAFETY_INJECTION"

  HALT:
    description: "HC2/HC3/HC4 任一触发，或 WARN 累计≥3"
    action: "立即停止，隔离输出，报告用户"
    triggers:
      - "HC2_TRUNCATION"
      - "HC3_CONTENT_DEGRADATION"
      - "HC4_REFUSAL_LOOP"

# ---------------------------------------------------------------------------
# 重试策略
# ---------------------------------------------------------------------------
retry_strategy:
  escalation:
    attempt_1: "提升声明级别（如 L2 → L2+L3）"
    attempt_2: "拆分场景为更小的段落单独生成"
    attempt_3: "进入 HALT，等待用户决策"

  # 重试时绝不执行的操作
  forbidden_actions:
    - "自动降低描写尺度"
    - "自动删除或修改用户的描写规范"
    - "建议用户换一种方式表达"
    - "用模糊描写替代具体描写"

# ---------------------------------------------------------------------------
# 隔离区
# ---------------------------------------------------------------------------
quarantine:
  enabled: true
  dir: ".xushikj/quarantine"
  keep_all_attempts: true          # 保留所有尝试（不自动清理）

# ---------------------------------------------------------------------------
# HALT 选项配置
# ---------------------------------------------------------------------------
halt_options:
  default_recommendation: "A"      # 默认推荐重试
  options:
    A:
      label: "重试当前章节（推荐）"
      description: "使用增强声明重新生成，自动提升声明级别"
    B:
      label: "调整场景敏感度后重试"
      description: "修改当前场景的 sensitivity_tag 后重新生成"
    C:
      label: "跳过当前场景，继续下一个"
      description: "当前场景标记为 TODO，后续手动补充"
    D:
      label: "修改创作指令后重试（最后手段）"
      description: "您来调整描写要求，系统据此重新生成"
